<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff}
  .card{padding:24px;box-sizing:border-box;display:flex;gap:18px;flex-wrap:wrap;background:#fafafa}
  .b{width:120px;height:72px;background:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--fg-muted);font-size:11px;font-family:var(--font-mono)}
</style></head><body>
<div class="card">
  <div class="b" style="box-shadow:var(--shadow-xs)">xs</div>
  <div class="b" style="box-shadow:var(--shadow-sm)">sm</div>
  <div class="b" style="box-shadow:var(--shadow-md)">md · dropdown</div>
  <div class="b" style="box-shadow:var(--shadow-lg)">lg · bulk bar</div>
  <div class="b" style="box-shadow:var(--shadow-overlay)">overlay · modal</div>
</div>
</body></html>
