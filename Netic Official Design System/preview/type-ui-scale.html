<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff}
  .card{padding:22px 24px;box-sizing:border-box}
  .spec{display:flex;align-items:baseline;justify-content:space-between;padding:6px 0;border-bottom:1px dashed var(--border)}
  .spec:last-child{border-bottom:0}
  .name{color:var(--fg-muted);font-size:11px;font-family:var(--font-mono);min-width:160px}
</style></head><body>
<div class="card">
  <div class="spec"><span class="t-body-sm">Body sm · explanatory helper text.</span><span class="name">12 / 400 / muted</span></div>
  <div class="spec"><span class="t-label">Label · Display Name</span><span class="name">12 / 500</span></div>
  <div class="spec"><span class="t-caption">Caption · Version 3 (confirmed) · 34 job types</span><span class="name">11 / 400 / caption</span></div>
  <div class="spec"><span class="t-overline">Overline · maintenance</span><span class="name">10 / 500 / UPPER / 0.08</span></div>
  <div class="spec"><span class="t-mono">t-mono · $349.00 · stg_12ab</span><span class="name">12 / mono</span></div>
</div>
</body></html>
