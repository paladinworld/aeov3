<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff}
  .card{padding:20px 24px;box-sizing:border-box}
  .row{display:flex;gap:8px;flex-wrap:wrap}
  .s{width:88px}
  .chip{height:48px;border-radius:6px;border:1px solid rgba(0,0,0,0.06)}
  .n{font-size:11px;font-weight:500;margin-top:6px;color:var(--fg)}
  .v{font-size:10px;color:var(--fg-muted);font-family:var(--font-mono)}
</style></head><body>
<div class="card">
  <div class="row">
    <div class="s"><div class="chip" style="background:var(--green-50)"></div><div class="n">green-50</div><div class="v">#F9FFFB</div></div>
    <div class="s"><div class="chip" style="background:var(--green-100)"></div><div class="n">green-100</div><div class="v">#F3F8F6</div></div>
    <div class="s"><div class="chip" style="background:var(--green-200)"></div><div class="n">green-200</div><div class="v">#C4DDD1</div></div>
    <div class="s"><div class="chip" style="background:var(--green-300)"></div><div class="n">green-300</div><div class="v">#A5BFA5</div></div>
    <div class="s"><div class="chip" style="background:var(--green-400)"></div><div class="n">green-400</div><div class="v">#89BBA3</div></div>
    <div class="s"><div class="chip" style="background:var(--green-500)"></div><div class="n">green-500</div><div class="v">#78B18E</div></div>
    <div class="s"><div class="chip" style="background:var(--green-600)"></div><div class="n">green-600</div><div class="v">#699969</div></div>
    <div class="s"><div class="chip" style="background:var(--green-700)"></div><div class="n">green-700</div><div class="v">#0F5B2C</div></div>
    <div class="s"><div class="chip" style="background:var(--green-800)"></div><div class="n">green-800</div><div class="v">#0D5A2B</div></div>
    <div class="s"><div class="chip" style="background:var(--green-900)"></div><div class="n">green-900</div><div class="v">#173F33</div></div>
  </div>
</div>
</body></html>
