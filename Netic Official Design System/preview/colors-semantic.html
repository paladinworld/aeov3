<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff}
  .card{padding:20px 24px;box-sizing:border-box}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .s{width:120px}
  .chip{height:48px;border-radius:6px;border:1px solid rgba(0,0,0,0.06);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:500}
  .n{font-size:11px;font-weight:500;margin-top:6px;color:var(--fg)}
  .v{font-size:10px;color:var(--fg-muted);font-family:var(--font-mono)}
</style></head><body>
<div class="card">
  <div class="row">
    <div class="s"><div class="chip" style="background:var(--primary)">Primary</div><div class="n">primary</div><div class="v">147 73% 27%</div></div>
    <div class="s"><div class="chip" style="background:var(--accent)">Accent</div><div class="n">accent</div><div class="v">212 56% 49%</div></div>
    <div class="s"><div class="chip" style="background:var(--success)">Success</div><div class="n">success</div><div class="v">147 52% 41%</div></div>
    <div class="s"><div class="chip" style="background:var(--warning)">Warning</div><div class="n">warning</div><div class="v">29 80% 55%</div></div>
    <div class="s"><div class="chip" style="background:var(--destructive)">Destructive</div><div class="n">destructive</div><div class="v">0 73% 45%</div></div>
    <div class="s"><div class="chip" style="background:var(--information)">Information</div><div class="n">information</div><div class="v">213 61% 47%</div></div>
  </div>
</div>
</body></html>
