<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff}
  .card{padding:22px 24px;box-sizing:border-box;display:flex;gap:16px;flex-wrap:wrap}
  .box{width:96px;height:72px;background:var(--bg-muted);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--fg-muted);font-size:11px;font-family:var(--font-mono)}
</style></head><body>
<div class="card">
  <div class="box" style="border-radius:4px">sm · 4</div>
  <div class="box" style="border-radius:6px">md · 6</div>
  <div class="box" style="border-radius:8px">lg · 8</div>
  <div class="box" style="border-radius:12px">xl · 12</div>
  <div class="box" style="border-radius:16px">2xl · 16</div>
  <div class="box" style="border-radius:9999px">full</div>
</div>
</body></html>
