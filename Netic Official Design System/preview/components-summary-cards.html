<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff}
  .card{padding:24px;box-sizing:border-box;display:flex;gap:16px;flex-wrap:wrap}
  .stat{flex:1;min-width:180px;border:1px solid var(--border);border-radius:8px;padding:20px}
  .stat .h{display:flex;align-items:center;gap:10px;color:var(--fg-muted);font-size:13px;font-weight:500;margin-bottom:8px}
  .stat .n{font-size:30px;font-weight:600;color:var(--fg);font-variant-numeric:tabular-nums;line-height:1}
  .stat .s{font-size:11px;color:var(--fg-muted);margin-top:8px;line-height:1.5}
  .stat svg{width:18px;height:18px}
  .ok{color:var(--success)}
  .mute{color:var(--fg-muted)}
  .warn{color:var(--warning)}
</style></head><body>
<div class="card">
  <div class="stat">
    <div class="h"><svg class="ok" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>Configured</div>
    <div class="n">34</div>
    <div class="s">Job types that Netic's AI agent will handle.</div>
  </div>
  <div class="stat">
    <div class="h"><svg class="mute" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>Excluded</div>
    <div class="n">8</div>
    <div class="s">Outside Netic's scope.</div>
  </div>
  <div class="stat">
    <div class="h"><svg class="warn" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>Needs input</div>
    <div class="n">2</div>
    <div class="s">Couldn't be auto-matched.</div>
  </div>
</div>
</body></html>
