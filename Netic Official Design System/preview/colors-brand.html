<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; background:#fff; }
  .card { padding: 20px 24px; box-sizing:border-box; }
  .swatch-row { display:flex; gap: 10px; flex-wrap:wrap; }
  .swatch {
    width: 110px;
  }
  .swatch .chip {
    height: 52px;
    border-radius: 6px;
    border: 1px solid rgba(0,0,0,0.06);
  }
  .swatch .name { font-size: 11px; font-weight: 500; margin-top: 6px; color: var(--fg); }
  .swatch .val  { font-size: 10px; color: var(--fg-muted); font-family: var(--font-mono); }
</style>
</head>
<body>
<div class="card">
  <div class="swatch-row">
    <div class="swatch"><div class="chip" style="background:var(--netic-green)"></div><div class="name">Netic green</div><div class="val">#137A4A</div></div>
    <div class="swatch"><div class="chip" style="background:var(--netic-green-hover)"></div><div class="name">Green hover</div><div class="val">147 73% 32%</div></div>
    <div class="swatch"><div class="chip" style="background:var(--netic-green-deep)"></div><div class="name">Deep green</div><div class="val">#0D5A2B</div></div>
    <div class="swatch"><div class="chip" style="background:var(--netic-green-ink)"></div><div class="name">Ink green</div><div class="val">#173F33</div></div>
    <div class="swatch"><div class="chip" style="background:var(--netic-cream)"></div><div class="name">Cream</div><div class="val">#FFFDF5</div></div>
  </div>
</div>
</body></html>
