<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff}
  .card{padding:20px 24px;box-sizing:border-box;display:flex;flex-direction:column;gap:10px}
  label{display:block;font-size:12px;font-weight:500;margin-bottom:4px;color:var(--fg)}
  .field{display:flex;flex-direction:column;max-width:340px}
  input,select{font-family:inherit;font-size:13px;padding:8px 12px;border:1px solid var(--border);border-radius:6px;background:#fff;color:var(--fg);outline:none;transition:box-shadow var(--dur),border-color var(--dur)}
  input:focus,select:focus{border-color:var(--primary-hover);box-shadow:0 0 0 2px color-mix(in oklab, var(--primary-hover) 30%, transparent)}
  input::placeholder{color:var(--fg-placeholder)}
  .search{position:relative}
  .search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--fg-muted);pointer-events:none}
  .search input{padding-left:30px;width:100%;box-sizing:border-box}
  .row{display:flex;gap:12px}
</style></head><body>
<div class="card">
  <div class="row">
    <div class="field" style="flex:1">
      <label>Display name</label>
      <input type="text" value="AC Repair">
    </div>
    <div class="field" style="width:110px">
      <label>Price</label>
      <input type="text" value="$ 129.00">
    </div>
  </div>
  <div class="row">
    <div class="field" style="flex:1">
      <label>Search</label>
      <div class="search">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" placeholder="Search job types…">
      </div>
    </div>
    <div class="field" style="width:150px">
      <label>Trade</label>
      <select><option>All trades</option><option>HVAC</option><option>Plumbing</option></select>
    </div>
  </div>
</div>
</body></html>
