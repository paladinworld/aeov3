<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff}
  .card{padding:22px 24px;box-sizing:border-box}
  .spec{display:flex;align-items:baseline;justify-content:space-between;padding:6px 0;border-bottom:1px dashed var(--border)}
  .spec:last-child{border-bottom:0}
  .name{color:var(--fg-muted);font-size:11px;font-family:var(--font-mono);min-width:160px}
</style></head><body>
<div class="card">
  <div class="spec"><span class="t-h1">Heading 1 · Tenants</span><span class="name">24 / 600 / -0.01em</span></div>
  <div class="spec"><span class="t-h2">Heading 2 · Review &amp; Confirm</span><span class="name">20 / 600</span></div>
  <div class="spec"><span class="t-h3">Heading 3 · Standard Rules</span><span class="name">18 / 600</span></div>
  <div class="spec"><span class="t-body">Body — the operator reads this by default.</span><span class="name">14 / 400</span></div>
</div>
</body></html>
