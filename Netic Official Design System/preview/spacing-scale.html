<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff}
  .card{padding:22px 24px;box-sizing:border-box}
  .row{display:flex;align-items:flex-end;gap:14px}
  .bar{background:var(--netic-green);opacity:0.85;border-radius:2px}
  .lbl{font-size:10px;color:var(--fg-muted);font-family:var(--font-mono);margin-top:4px;text-align:center}
  .s{display:flex;flex-direction:column;align-items:center}
</style></head><body>
<div class="card">
  <div class="row">
    <div class="s"><div class="bar" style="width:4px;height:4px"></div><div class="lbl">4</div></div>
    <div class="s"><div class="bar" style="width:8px;height:8px"></div><div class="lbl">8</div></div>
    <div class="s"><div class="bar" style="width:12px;height:12px"></div><div class="lbl">12</div></div>
    <div class="s"><div class="bar" style="width:16px;height:16px"></div><div class="lbl">16</div></div>
    <div class="s"><div class="bar" style="width:24px;height:24px"></div><div class="lbl">24</div></div>
    <div class="s"><div class="bar" style="width:32px;height:32px"></div><div class="lbl">32</div></div>
    <div class="s"><div class="bar" style="width:48px;height:48px"></div><div class="lbl">48</div></div>
    <div class="s"><div class="bar" style="width:64px;height:64px"></div><div class="lbl">64</div></div>
  </div>
</div>
</body></html>
