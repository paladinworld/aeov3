<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff}
  .card{padding:20px 24px;box-sizing:border-box}
  /* Bulk edit bar — direct port of BulkEditBar.tsx visual */
  .bar{display:inline-flex;align-items:center;gap:12px;background:var(--fg);color:#fff;border-radius:8px;box-shadow:var(--shadow-lg);padding:10px 16px;font-size:13px}
  .bar .count{font-weight:500}
  .bar .sep{width:1px;height:16px;background:rgba(255,255,255,0.2)}
  .bar button{background:rgba(255,255,255,0.1);border:0;color:#fff;font-size:11px;border-radius:4px;padding:6px 12px;cursor:pointer;font-family:inherit;transition:background var(--dur)}
  .bar button:hover{background:rgba(255,255,255,0.2)}
  .bar .x{background:transparent;padding:4px;display:inline-flex;align-items:center;justify-content:center;border-radius:4px}
  .bar .x:hover{background:rgba(255,255,255,0.2)}
  .bar svg{width:14px;height:14px}
</style></head><body>
<div class="card">
  <div class="bar">
    <span class="count">3 selected</span>
    <span class="sep"></span>
    <button>Set Bookable</button>
    <button>Set Not Bookable</button>
    <button>Enable Scheduler</button>
    <button>Exclude All</button>
    <span class="sep"></span>
    <button class="x"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
  </div>
</div>
</body></html>
