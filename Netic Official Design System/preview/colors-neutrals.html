<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff}
  .card{padding:20px 24px;box-sizing:border-box}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .s{width:102px}
  .chip{height:48px;border-radius:6px;border:1px solid rgba(0,0,0,0.06)}
  .n{font-size:11px;font-weight:500;margin-top:6px;color:var(--fg)}
  .v{font-size:10px;color:var(--fg-muted);font-family:var(--font-mono)}
</style></head><body>
<div class="card">
  <div class="row">
    <div class="s"><div class="chip" style="background:#fff"></div><div class="n">Background</div><div class="v">0 0% 100%</div></div>
    <div class="s"><div class="chip" style="background:var(--bg-muted)"></div><div class="n">Muted</div><div class="v">0 0% 97.3%</div></div>
    <div class="s"><div class="chip" style="background:var(--bg-sidebar)"></div><div class="n">Sidebar</div><div class="v">0 0% 98%</div></div>
    <div class="s"><div class="chip" style="background:var(--surface-card)"></div><div class="n">Card</div><div class="v">0 0% 96%</div></div>
    <div class="s"><div class="chip" style="background:var(--surface-selected)"></div><div class="n">Selected</div><div class="v">0 0% 88%</div></div>
    <div class="s"><div class="chip" style="background:var(--border)"></div><div class="n">Border</div><div class="v">210 8% 90%</div></div>
    <div class="s"><div class="chip" style="background:var(--border-strong)"></div><div class="n">Border strong</div><div class="v">0 0% 82%</div></div>
  </div>
</div>
</body></html>
