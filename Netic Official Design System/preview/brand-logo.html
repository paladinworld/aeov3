<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff}
  .wrap{display:flex;gap:0;height:150px}
  .a{flex:1;background:var(--netic-green-ink);display:flex;align-items:center;justify-content:center}
  .b{flex:1;background:#fff;border-left:1px solid var(--border);display:flex;align-items:center;justify-content:center}
  .c{flex:1;background:var(--netic-cream);display:flex;align-items:center;justify-content:center;border-left:1px solid var(--border)}
  .wm{height:38px}
  .n{height:44px}
</style></head><body>
<div class="wrap">
  <div class="a"><img class="wm" src="../assets/netic-wordmark-cream.svg"></div>
  <div class="b"><img class="wm" src="../assets/netic-wordmark-green.svg"></div>
  <div class="c"><img class="n" src="../assets/netic-n-mark.svg"></div>
</div>
</body></html>
